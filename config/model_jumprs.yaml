model:
  encoder_type: "JumpRS"
  hidden_dim: 192
  num_layers: 3
  dropout: 0.08
  num_regimes: 3
  truncation_order: 2
  x_min: 0.0
  x_max: 1.2
  m_max: 0.5
  eps: 1.0e-6
  eps_var: 1.0e-3
  dt: 1.0
  transition_nll_weight: 1.0
  mixture_crps_weight: 1.0
  crps_scale: "power"
  crps_distribution: "conditional_mixture"
  use_marginal_moments_for_predictions: false
  power_loss_scale: "global_max_capacity"
  event_inference: "mc_path"
  mc_event_samples: 128
  use_mc_samples_for_intervals: true
  use_input_scaler: false
  dedicated_predictor: false
  site_conditioning: false
  markov_regimes: true
  bounded_distribution: false
  bounded_crps_grid_size: 33
  conditioning_path_mode: "mean"
  adaptive_loss_balance: true
  adaptive_loss_mode: "gradient"
  adaptive_loss_ema_decay: 0.95
  adaptive_loss_min_weight: 0.25
  adaptive_loss_strength: 1.0
  horizon_weight_power: 0.0
  site_focus_capacity_kw: null
  site_focus_weight: 1.0
